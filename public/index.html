<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Pro - Ibrahim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { height: 100dvh; background: #e5ddd5; font-family: 'Inter', sans-serif; }
        #chat-window { background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .bubble { max-width: 85%; position: relative; border-radius: 12px; }
        .self { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 2px; }
        .other { background: #ffffff; align-self: flex-start; border-top-left-radius: 2px; }
        .menu-btn { display: none; }
        .bubble:hover .menu-btn { display: block; }
    </style>
</head>
<body class="flex flex-col md:flex-row overflow-hidden">

    <div id="auth-modal" class="fixed inset-0 bg-white z-[100] flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center space-y-4">
            <h1 class="text-3xl font-black text-[#128c7e]">MESSENGER PRO <br> Ibrahim & Lipa</h1>
            <input id="u" type="text" placeholder="ইউজারনেম" class="w-full border p-4 rounded-2xl outline-none focus:border-[#128c7e]">
            <input id="p" type="password" placeholder="পাসওয়ার্ড" class="w-full border p-4 rounded-2xl outline-none focus:border-[#128c7e]">
            <button onclick="auth('login')" class="w-full bg-[#128c7e] text-white p-4 rounded-2xl font-bold active:scale-95 transition shadow-lg">লগইন</button>
            <button onclick="auth('reg')" class="text-gray-500 hover:underline">নতুন অ্যাকাউন্ট তৈরি করুন</button>
        </div>
    </div>

    <div class="hidden md:flex w-80 bg-white border-r flex-col">
        <header class="p-4 bg-[#f0f2f5] flex justify-between items-center border-b">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-10 h-10 rounded-full border">
            <button onclick="location.reload()" class="hover:rotate-180 transition-all duration-500"><i class="fas fa-sync-alt text-gray-600"></i></button>
        </header>
        <div id="user-list" class="flex-1 overflow-y-auto"></div>
    </div>

    <div class="flex-1 flex flex-col relative h-full bg-[#e5ddd5]">
        <header class="h-16 bg-[#075e54] text-white flex items-center px-4 justify-between shrink-0 shadow-md">
            <div class="flex items-center gap-3">
                <div class="font-bold">
                    <span id="my-name">Messenger Lite</span>
                    <p id="t-status" class="text-[10px] text-green-300 italic h-3"></p>
                </div>
            </div>
            <button onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-3"></div>

        <div class="p-3 bg-[#f0f2f5] flex items-center gap-2 border-t">
            <button onclick="document.getElementById('img-in').click()" class="text-gray-600 text-xl px-2 hover:text-green-600"><i class="fas fa-image"></i></button>
            <input type="file" id="img-in" hidden accept="image/*" onchange="sendImg(this)">
            <input id="msg-in" type="text" placeholder="মেসেজ লিখুন..." class="flex-1 bg-white p-3 rounded-full outline-none px-5 shadow-sm" oninput="notifyT()">
            <button onclick="send()" class="bg-[#128c7e] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        // সকেট কনফিগারেশন - মোবাইল ব্যাকগ্রাউন্ডে ভালো কাজ করার জন্য
        const socket = io({
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 1000
        });

        let me = JSON.parse(localStorage.getItem('m-user'));
        let isEdit = false, editId = null;

        const Toast = Swal.mixin({
            toast: true, position: 'top-end',
            showConfirmButton: false, timer: 3000, timerProgressBar: true
        });

        // ১. সার্ভিস ওয়ার্কার রেজিস্ট্রেশন (নোটিফিকেশন এর জন্য জরুরি)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW Registered'))
                .catch(err => console.log('SW Registration failed', err));
            });
        }

        // ২. নোটিফিকেশন পারমিশন চাওয়া
        function askPermission() {
            if ("Notification" in window && Notification.permission !== "granted") {
                Notification.requestPermission();
            }
        }
        askPermission();

        if (me) { 
            document.getElementById('auth-modal').remove(); 
            document.getElementById('my-name').innerText = me.username;
            socket.emit('join', me); 
        }

        async function auth(type) {
            const username = document.getElementById('u').value, pass = document.getElementById('p').value;
            if(!username || !pass) return Swal.fire({ icon: 'warning', title: 'উফ!', text: 'ইউজারনেম এবং পাসওয়ার্ড দিন' });

            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, pass, type, avatar: 'https://cdn-icons-png.flaticon.com/512/149/149071.png' })
            });
            const data = await res.json();
            if (data.username) {
                localStorage.setItem('m-user', JSON.stringify(data));
                location.reload();
            } else {
                Swal.fire({ icon: 'error', title: 'ব্যর্থ!', text: data.error });
            }
        }

        function append(u, t, isSelf, time, id, isImg, edited) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.id = `msg-${id}`;
            div.className = `bubble p-2 shadow-sm ${isSelf ? 'self' : 'other'}`;
            div.innerHTML = `
                <div class="text-[10px] font-bold ${isSelf ? 'text-green-700' : 'text-blue-600'} mb-1">${u}</div>
                ${isImg ? `<img src="${t}" class="rounded-lg max-w-full mb-1 cursor-pointer" onclick="viewImg('${t}')">` : `<p id="t-${id}">${t}</p>`}
                <div class="flex justify-end items-center gap-1 text-[9px] text-gray-500">
                    ${edited ? '<span>সম্পাদিত</span>' : ''} <span>${time}</span>
                    <div class="menu-btn ml-2 cursor-pointer flex gap-2">
                        ${isSelf && !isImg ? `<i onclick="startEdit('${id}', '${t}')" class="fas fa-edit text-blue-500"></i>` : ''}
                        ${isSelf ? `<i onclick="delMsg('${id}')" class="fas fa-trash text-red-500"></i>` : ''}
                    </div>
                </div>`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;

            // ৩. উন্নত নোটিফিকেশন লজিক
            if (!isSelf && (document.hidden || !document.hasFocus())) {
                playNotifSound();
                showWebNotification(u, isImg ? "একটি ছবি পাঠিয়েছেন" : t);
            }
        }

        function showWebNotification(sender, message) {
            if (Notification.permission === "granted") {
                const options = {
                    body: message,
                    icon: 'https://cdn-icons-png.flaticon.com/512/149/149071.png',
                    vibrate: [200, 100, 200]
                };
                new Notification(`নতুন মেসেজ: ${sender}`, options);
            }
        }

        function playNotifSound() {
            const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');
            audio.play().catch(e => console.log("Sound play blocked"));
        }

        function send() {
            const input = document.getElementById('msg-in');
            if (!input.value.trim()) return;
            const msgId = Date.now().toString(), time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            if(isEdit) {
                socket.emit('edit-msg', { id: editId, newText: input.value });
                isEdit = false; editId = null;
            } else {
                const data = { user: me.username, text: input.value, time, msgId, isImage: false };
                append('আপনি', data.text, true, time, msgId, false);
                socket.emit('chat-message', data);
            }
            input.value = '';
        }

        function sendImg(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                const msgId = Date.now().toString(), time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const data = { user: me.username, text: reader.result, time, msgId, isImage: true };
                append('আপনি', reader.result, true, time, msgId, true);
                socket.emit('chat-message', data);
            };
            reader.readAsDataURL(file);
        }

        function delMsg(id) {
            Swal.fire({
                title: 'মুছে ফেলবেন?', text: "এটি আর ফিরে পাওয়া যাবে না!", icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#128c7e', confirmButtonText: 'হ্যাঁ, মুছুন'
            }).then((res) => { if (res.isConfirmed) socket.emit('delete-msg', id); });
        }

        function startEdit(id, text) {
            isEdit = true; editId = id;
            document.getElementById('msg-in').value = text;
            document.getElementById('msg-in').focus();
            Toast.fire({ icon: 'info', title: 'এডিট মোড চালু' });
        }

        function logout() {
            Swal.fire({ title: 'লগআউট করতে চান?', icon: 'question', showCancelButton: true, confirmButtonText: 'হ্যাঁ' })
            .then((res) => { if(res.isConfirmed) { localStorage.clear(); location.reload(); } });
        }

        function viewImg(url) { Swal.fire({ imageUrl: url, imageAlt: 'Preview', showConfirmButton: false, background: 'transparent' }); }
        function notifyT() { socket.emit('typing', me.username); }
        
        socket.on('user-typing', u => { 
            document.getElementById('t-status').innerText = `${u} টাইপ করছে...`;
            setTimeout(() => document.getElementById('t-status').innerText = '', 2000);
        });

        socket.on('chat-message', d => append(d.user, d.text, false, d.time, d.msgId, d.isImage, d.isEdited));
        socket.on('msg-deleted', id => document.getElementById(`msg-${id}`)?.remove());
        socket.on('msg-edited', ({id, newText}) => { 
            const el = document.getElementById(`t-${id}`);
            if(el) el.innerText = newText;
        });

        socket.on('load-history', h => h.forEach(d => append(d.user === me.username ? 'আপনি' : d.user, d.text, d.user === me.username, d.time, d.msgId, d.isImage, d.isEdited)));
        
        socket.on('user-list', users => {
            document.getElementById('user-list').innerHTML = users.map(u => `
                <div class="flex items-center gap-3 p-4 hover:bg-gray-100 border-b cursor-pointer transition">
                    <img src="${u.avatar}" class="w-12 h-12 rounded-full border shadow-sm">
                    <div>
                        <div class="font-bold text-sm text-gray-800">${u.username}</div>
                        <div class="text-[10px] text-green-500 flex items-center gap-1"><span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> অনলাইন</div>
                    </div>
                </div>`).join('');
        });

        document.getElementById('msg-in').onkeypress = (e) => { if(e.key === 'Enter') send(); };
    </script>
</body>
</html>
