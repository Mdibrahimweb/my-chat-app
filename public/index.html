<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Pro - Ibrahim & Lipa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            height: 100dvh;
            background: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
        }

        #chat-window {
            background: #e5ddd5 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        .msg-self {
            border-radius: 15px 0 15px 15px;
        }

        .msg-other {
            border-radius: 0 15px 15px 15px;
        }
    </style>
</head>

<body class="flex flex-col md:flex-row overflow-hidden">

    <div id="auth-screen" class="fixed inset-0 z-[500] bg-white flex items-center justify-center p-4">
        <div class="max-w-md w-full glass p-8 rounded-3xl shadow-2xl text-center space-y-6">
            <h1 class="text-4xl font-black text-[#128c7e]">MESSENGER PRO</h1>
            <div id="avatar-preview-box" class="flex justify-center">
                <label for="reg-avatar" class="cursor-pointer relative">
                    <img id="preview-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                        class="w-24 h-24 rounded-full border-4 border-[#128c7e] object-cover">
                    <div class="absolute bottom-0 right-0 bg-[#128c7e] text-white p-2 rounded-full text-xs"><i
                            class="fas fa-camera"></i></div>
                </label>
                <input type="file" id="reg-avatar" hidden accept="image/*" onchange="previewAvatar(this)">
            </div>
            <input id="auth-user" type="text" placeholder="ইউজারনেম"
                class="w-full p-4 border rounded-2xl outline-none focus:border-[#128c7e]">
            <input id="auth-pass" type="password" placeholder="পাসওয়ার্ড"
                class="w-full p-4 border rounded-2xl outline-none focus:border-[#128c7e]">
            <button onclick="handleAuth('login')"
                class="w-full bg-[#128c7e] text-white p-4 rounded-2xl font-bold hover:opacity-90 transition">লগইন</button>
            <button onclick="handleAuth('register')" class="text-gray-500 text-sm hover:underline">নতুন অ্যাকাউন্ট তৈরি
                করুন</button>
        </div>
    </div>

    <div id="sidebar" class="w-full md:w-80 bg-white border-r flex flex-col hidden md:flex">
        <div class="p-6 bg-[#075e54] text-white flex justify-between items-center shrink-0">
            <h2 class="font-bold">সক্রিয় ইউজার</h2>
            <button onclick="logout()"><i class="fas fa-power-off"></i></button>
        </div>
        <div id="user-list" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
    </div>

    <div class="flex-1 flex flex-col relative h-full">
        <header class="h-16 bg-[#075e54] text-white flex items-center px-4 justify-between shrink-0">
            <div class="flex items-center gap-3">
                <img id="my-avatar-display" src="" class="w-10 h-10 rounded-full border-2 border-white object-cover">
                <div>
                    <h2 id="my-name-display" class="font-bold text-sm">ইব্রাহীম</h2>
                    <p id="typing-status" class="text-[10px] text-green-300 italic h-3"></p>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="document.getElementById('edit-avatar-input').click()"><i
                        class="fas fa-user-edit"></i></button>
                <input type="file" id="edit-avatar-input" hidden accept="image/*" onchange="updateProfileImg(this)">
            </div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

        <div class="bg-white border-t p-3">
            <form id="chat-form" class="flex items-center gap-2">
                <button type="button" onclick="document.getElementById('img-send').click()"
                    class="text-gray-500 text-xl px-2"><i class="fas fa-image"></i></button>
                <input type="file" id="img-send" hidden accept="image/*" onchange="sendImage(this)">

                <input id="msg-input" type="text" placeholder="মেসেজ লিখুন..."
                    class="flex-1 bg-gray-100 rounded-full py-3 px-6 outline-none" oninput="notifyTyping()">

                <button type="submit"
                    class="bg-[#128c7e] text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center shrink-0">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = JSON.parse(localStorage.getItem('user-session'));
        let selectedAvatarBase64 = '';

        window.onload = () => { if (currentUser) { document.getElementById('auth-screen').classList.add('hidden'); initApp(); } };

        // ছবি প্রিভিউ (রজিস্ট্রেশনের সময়)
        function previewAvatar(input) {
            const reader = new FileReader();
            reader.onload = e => {
                selectedAvatarBase64 = e.target.result;
                document.getElementById('preview-img').src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function handleAuth(type) {
            const username = document.getElementById('auth-user').value;
            const password = document.getElementById('auth-pass').value;
            const res = await fetch(`/api/${type}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, avatar: selectedAvatarBase64 || undefined })
            });
            const data = await res.json();
            if (data.error) return alert(data.error);
            localStorage.setItem('user-session', JSON.stringify(data));
            location.reload();
        }

        function initApp() {
            document.getElementById('my-name-display').innerText = currentUser.username;
            document.getElementById('my-avatar-display').src = currentUser.avatar;
            socket.emit('new-user', currentUser);
        }

        // ছবি পাঠানো
        function sendImage(input) {
            const reader = new FileReader();
            reader.onload = e => {
                const msgData = {
                    user: currentUser.username, text: e.target.result, avatar: currentUser.avatar,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    msgId: Date.now().toString(), isFile: true
                };
                appendMessage('আপনি', msgData.text, msgData.time, 'self-end', msgData.avatar, true, msgData.msgId);
                socket.emit('chat-message', msgData);
            };
            reader.readAsDataURL(input.files[0]);
        }

        function appendMessage(user, content, time, align, avatar, isFile, msgId, isEdited) {
            const chat = document.getElementById('chat-window');
            const isSelf = align === 'self-end';
            const div = document.createElement('div');
            div.id = `msg-${msgId}`;
            div.className = `flex w-full ${isSelf ? 'justify-end' : 'justify-start'} group`;

            div.innerHTML = `
                <div class="flex gap-2 max-w-[85%] ${isSelf ? 'flex-row-reverse' : ''}">
                    <img src="${avatar}" class="w-8 h-8 rounded-full self-end object-cover">
                    <div class="relative ${isSelf ? 'bg-[#dcf8c6] msg-self' : 'bg-white msg-other'} p-3 shadow-sm border border-black/5">
                        <p class="text-[10px] font-bold ${isSelf ? 'text-green-700' : 'text-blue-600'} mb-1">${user}</p>
                        ${isFile ? `<img src="${content}" class="rounded-lg max-w-full cursor-pointer" onclick="window.open(this.src)">` : `<p id="text-${msgId}" class="text-sm">${content}</p>`}
                        <div class="flex items-center justify-end gap-2 mt-1">
                            ${isEdited ? `<span class="text-[8px] italic text-gray-400">এডিট করা</span>` : ''}
                            <p class="text-[9px] text-gray-400">${time}</p>
                        </div>
                        
                        ${isSelf ? `
                            <div class="absolute top-0 ${isSelf ? '-left-12' : '-right-12'} hidden group-hover:flex gap-2 p-1">
                                <button onclick="deleteMsg('${msgId}')" class="text-red-400 text-xs"><i class="fas fa-trash"></i></button>
                                ${!isFile ? `<button onclick="editMsg('${msgId}')" class="text-blue-400 text-xs"><i class="fas fa-edit"></i></button>` : ''}
                            </div>
                        ` : ''}
                    </div>
                </div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // টাইপিং স্ট্যাটাস
        function notifyTyping() { socket.emit('typing', currentUser.username); }
        socket.on('user-typing', user => {
            document.getElementById('typing-status').innerText = `${user} টাইপ করছে...`;
            setTimeout(() => document.getElementById('typing-status').innerText = '', 2000);
        });

        // ডিলিট এবং এডিট
        function deleteMsg(id) { if (confirm("মুছে ফেলবেন?")) socket.emit('delete-message', id); }
        function editMsg(id) {
            const oldText = document.getElementById(`text-${id}`).innerText;
            const newText = prompt("মেসেজ এডিট করুন:", oldText);
            if (newText) socket.emit('edit-message', { msgId: id, newText });
        }

        socket.on('message-deleted', id => document.getElementById(`msg-${id}`)?.remove());
        socket.on('message-edited', d => {
            const el = document.getElementById(`text-${d.msgId}`);
            if (el) { el.innerText = d.newText; location.reload(); } // এডিট হলে রিফ্রেশ করলে সুবিধা বেশি
        });

        // চ্যাট ফর্ম
        document.getElementById('chat-form').onsubmit = e => {
            e.preventDefault();
            const text = document.getElementById('msg-input').value;
            if (!text) return;
            const msgData = {
                user: currentUser.username, text, avatar: currentUser.avatar,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                msgId: Date.now().toString(), isFile: false
            };
            appendMessage('আপনি', text, msgData.time, 'self-end', msgData.avatar, false, msgData.msgId);
            socket.emit('chat-message', msgData);
            document.getElementById('msg-input').value = '';
        };

        socket.on('chat-message', d => appendMessage(d.user, d.text, d.time, 'self-start', d.avatar, d.isFile, d.msgId, d.isEdited));
        socket.on('load-history', h => h.forEach(d => appendMessage(d.user === currentUser.username ? 'আপনি' : d.user, d.text, d.time, d.user === currentUser.username ? 'self-end' : 'self-start', d.avatar, d.isFile, d.msgId, d.isEdited)));

        // ইউজার লিস্ট
        socket.on('user-list', (users) => {
            const list = document.getElementById('user-list');
            list.innerHTML = users.map(u => `
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-2xl border border-black/5">
                    <div class="flex items-center gap-3">
                        <img src="${u.avatar}" class="w-10 h-10 rounded-full object-cover border-2 border-white shadow-sm">
                        <span class="text-sm font-bold text-gray-700">${u.username}</span>
                    </div>
                    ${currentUser.role === 'admin' && u.username !== currentUser.username ? `<button onclick="banUser('${u.username}')" class="text-red-500 text-xs"><i class="fas fa-ban"></i></button>` : '<div class="w-2 h-2 bg-green-500 rounded-full"></div>'}
                </div>`).join('');
        });

        async function updateProfileImg(input) {
            const reader = new FileReader();
            reader.onload = async e => {
                await fetch('/api/update-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser.username, avatar: e.target.result })
                });
                currentUser.avatar = e.target.result;
                localStorage.setItem('user-session', JSON.stringify(currentUser));
                location.reload();
            };
            reader.readAsDataURL(input.files[0]);
        }

        // --- জাভাস্ক্রিপ্ট অংশে এই ফাংশনটি যোগ করুন ---

        async function compressImage(base64Str, maxWidth = 400, maxHeight = 400) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                    } else {
                        if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7)); // ৭০% কোয়ালিটিতে কম্প্রেস
                };
            });
        }

        // --- এখন sendImage ফাংশনটি নিচের মতো আপডেট করুন ---
        async function sendImage(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = async e => {
                const compressedImg = await compressImage(e.target.result); // এখানে কম্প্রেস হচ্ছে
                const msgData = {
                    user: currentUser.username, text: compressedImg, avatar: currentUser.avatar,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    msgId: Date.now().toString(), isFile: true
                };
                appendMessage('আপনি', msgData.text, msgData.time, 'self-end', msgData.avatar, true, msgData.msgId);
                socket.emit('chat-message', msgData);
            };
            reader.readAsDataURL(input.files[0]);
        }

        // --- previewAvatar ফাংশনটিও আপডেট করুন ---
        async function previewAvatar(input) {
            const reader = new FileReader();
            reader.onload = async e => {
                selectedAvatarBase64 = await compressImage(e.target.result, 150, 150); // প্রোফাইল পিক ছোট হবে
                document.getElementById('preview-img').src = selectedAvatarBase64;
            };
            reader.readAsDataURL(input.files[0]);
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>

</html>
