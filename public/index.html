<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger Pro - Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <style>
        :root { --chat-bg-color: #e5ddd5; --primary: #128c7e; }
        .dark { --chat-bg-color: #0b141a; }
        body { height: 100dvh; overflow: hidden; }
        #chat-window { flex: 1; background-color: var(--chat-bg-color); background-size: cover; background-position: center; transition: 0.3s; }
        .msg-bubble { max-width: 80%; position: relative; }
        .reply-box { border-left: 4px solid var(--primary); background: rgba(0,0,0,0.05); padding: 5px; margin-bottom: 5px; border-radius: 4px; font-size: 11px; }
        emoji-picker { width: 100%; max-height: 300px; display: none; position: absolute; bottom: 80px; left: 0; z-index: 50; }
        .recording-active { color: red !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 dark:bg-slate-950 font-sans flex overflow-hidden">

    <div id="video-call-ui" class="hidden fixed inset-0 bg-slate-900 z-[300] flex flex-col items-center justify-center text-white">
        <div class="w-32 h-32 rounded-full border-4 border-green-500 overflow-hidden mb-4">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="call-avatar" class="w-full h-full object-cover">
        </div>
        <h3 id="call-name" class="text-xl font-bold">Calling...</h3>
        <div class="flex gap-8 mt-12">
            <button onclick="endCall()" class="bg-red-600 w-16 h-16 rounded-full flex items-center justify-center text-2xl"><i class="fas fa-phone-slash"></i></button>
            <button class="bg-green-600 w-16 h-16 rounded-full flex items-center justify-center text-2xl"><i class="fas fa-video"></i></button>
        </div>
    </div>

    <div id="sidebar" class="bg-white dark:bg-slate-900 border-r dark:border-slate-800 flex flex-col shadow-2xl transition-all w-0 md:w-80 overflow-hidden">
        <div class="p-5 bg-[#128c7e] text-white flex justify-between">
            <h1 class="font-black">MESSENGER PRO</h1>
        </div>
        <div id="user-list" class="flex-1 overflow-y-auto p-4"></div>
    </div>

    <div class="flex-1 flex flex-col w-full relative h-full">
        <header class="h-16 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md flex items-center px-4 justify-between border-b dark:border-slate-800 shrink-0 z-20">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gray-200 overflow-hidden border">
                    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-full h-full object-cover">
                </div>
                <div>
                    <h2 class="font-bold text-sm dark:text-white">Messenger Group</h2>
                    <p id="typing-status" class="text-[10px] text-green-500 font-bold h-3"></p>
                </div>
            </div>
            <div class="flex gap-4 text-[#128c7e]">
                <button onclick="startCall('Video')"><i class="fas fa-video"></i></button>
                <button onclick="startCall('Voice')"><i class="fas fa-phone"></i></button>
                <button onclick="toggleTheme()"><i class="fas fa-adjust"></i></button>
            </div>
        </header>

        <div id="chat-window" class="p-4 overflow-y-auto flex flex-col space-y-4"></div>

        <emoji-picker id="picker"></emoji-picker>

        <div id="reply-preview" class="hidden bg-gray-200 dark:bg-slate-800 p-2 flex justify-between items-center border-t dark:border-slate-700">
            <div class="text-xs">
                <span class="font-bold text-[#128c7e]" id="reply-user"></span>
                <p id="reply-text" class="truncate opacity-70"></p>
            </div>
            <button onclick="cancelReply()"><i class="fas fa-times"></i></button>
        </div>

        <form id="chat-form" class="bg-white dark:bg-slate-900 p-3 border-t dark:border-slate-800">
            <div class="flex items-center gap-2">
                <button type="button" onclick="toggleEmoji()" class="text-gray-400 text-xl px-1"><i class="far fa-smile"></i></button>
                <button type="button" onclick="document.getElementById('file-input').click()" class="text-gray-400 text-xl"><i class="fas fa-plus"></i></button>
                <input type="file" id="file-input" class="hidden" onchange="handleImageSend(this)">
                
                <input id="msg-input" type="text" autocomplete="off" placeholder="মেসেজ লিখুন..." class="flex-1 bg-gray-100 dark:bg-slate-800 dark:text-white rounded-full py-2 px-4 focus:outline-none text-sm">
                
                <button type="button" id="voice-btn" class="text-gray-400 text-xl px-2 transition"><i class="fas fa-microphone"></i></button>
                <button type="submit" class="bg-[#128c7e] text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-paper-plane"></i></button>
            </div>
        </form>
    </div>

    <script>
        // Global State
        let isReply = false;
        let replyData = null;
        let isRecording = false;

        // 1. Emoji Picker Logic
        const picker = document.querySelector('emoji-picker');
        const msgInput = document.getElementById('msg-input');
        
        function toggleEmoji() {
            picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
        }

        picker.addEventListener('emoji-click', event => {
            msgInput.value += event.detail.unicode;
            picker.style.display = 'none';
        });

        // 2. Reply Message Logic
        function setReply(user, text) {
            isReply = true;
            replyData = { user, text };
            document.getElementById('reply-user').innerText = user;
            document.getElementById('reply-text').innerText = text;
            document.getElementById('reply-preview').classList.remove('hidden');
            msgInput.focus();
        }

        function cancelReply() {
            isReply = false;
            replyData = null;
            document.getElementById('reply-preview').classList.add('hidden');
        }

        // 3. Edit Message Logic (Shortcut: নিজের মেসেজে ডাবল ক্লিক)
        function editMessage(msgId, oldText) {
            const newText = prompt("মেসেজটি এডিট করুন:", oldText);
            if (newText && newText !== oldText) {
                // এখানে socket.emit('edit-message', {id, text}) পাঠাতে হবে
                document.querySelector(`#msg-${msgId} .msg-content`).innerText = newText + " (Edited)";
            }
        }

        // 4. Voice Recording Mockup
        const voiceBtn = document.getElementById('voice-btn');
        voiceBtn.onclick = () => {
            isRecording = !isRecording;
            voiceBtn.classList.toggle('recording-active');
            if(isRecording) {
                msgInput.placeholder = "Recording Audio...";
            } else {
                msgInput.placeholder = "মেসেজ লিখুন...";
                alert("Voice Message Sent (Feature Mockup)");
            }
        };

        // 5. Video Call Mockup
        function startCall(type) {
            document.getElementById('video-call-ui').classList.remove('hidden');
            document.getElementById('call-name').innerText = `${type} Calling...`;
        }

        function endCall() {
            document.getElementById('video-call-ui').classList.add('hidden');
        }

        // 6. Message Seen Status HTML (Modified appendMessage)
        function appendMessage(user, content, time, align, isFile, msgId, avatar, replyTo = null) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full ${align === 'self-end' ? 'justify-end' : 'justify-start'} mb-2 group`;
            wrapper.id = `msg-${msgId}`;

            const isSelf = align === 'self-end';
            const bubbleColor = isSelf ? 'bg-[#dcf8c6] dark:bg-[#054740]' : 'bg-white dark:bg-slate-800';

            wrapper.innerHTML = `
            <div class="flex gap-2 ${isSelf ? 'flex-row-reverse' : 'flex-row'} items-end msg-bubble" ondblclick="setReply('${user}', '${isFile ? 'Image' : content}')">
                <img src="${avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="w-7 h-7 rounded-full">
                <div class="${bubbleColor} p-2 rounded-2xl shadow-sm border dark:border-slate-700">
                    ${replyTo ? `<div class="reply-box opacity-60"><b>${replyTo.user}</b>: ${replyTo.text}</div>` : ''}
                    <p class="text-[10px] font-bold ${isSelf ? 'text-green-700' : 'text-gray-500'}">${user}</p>
                    <div class="msg-content text-sm dark:text-gray-100">${isFile ? `<img src="${content}" class="rounded-lg max-w-[200px]">` : content}</div>
                    <div class="flex items-center justify-end gap-1 mt-1">
                        <span class="text-[8px] opacity-50">${time}</span>
                        ${isSelf ? `<i class="fas fa-check-double text-[8px] text-blue-500" title="Seen"></i>` : ''}
                    </div>
                </div>
            </div>`;
            
            document.getElementById('chat-window').appendChild(wrapper);
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        }

        // 7. Form Submit with Reply
        document.getElementById('chat-form').onsubmit = (e) => {
            e.preventDefault();
            const text = msgInput.value.trim();
            if(!text) return;

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const msgId = Date.now();

            appendMessage('আপনি', text, time, 'self-end', false, msgId, '', replyData);
            
            // Socket emit-এ replyData ও পাঠাতে হবে
            // socket.emit('chat-message', { ..., replyTo: replyData });

            msgInput.value = '';
            cancelReply();
        };

    </script>
</body>
</html>
