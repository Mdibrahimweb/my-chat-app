<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Pro - BD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .msg-bubble:hover .options-btn { visibility: visible; }
        #chat-window { height: calc(100vh - 150px); }
        .active-user { background: #128c7e; color: white; }
        .glass { backdrop-filter: blur(15px); background: rgba(255, 255, 255, 0.75); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-200 via-gray-200 to-slate-300 font-sans h-screen flex overflow-hidden">

<div id="name-popup" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="glass p-8 rounded-2xl shadow-2xl w-80 text-center">
        <h2 class="text-2xl font-bold text-[#075e54] mb-4">চ্যাট শুরু করুন</h2>
        <input id="name-input" type="text" placeholder="আপনার নাম লিখুন..." class="w-full p-3 border rounded-xl mb-4 focus:outline-none">
        <button onclick="startChat()" class="bg-[#128c7e] text-white px-6 py-2 rounded-xl hover:bg-[#075e54] transition w-full">শুরু করুন</button>
    </div>
</div>

<div class="w-80 bg-white/80 backdrop-blur-lg border-r border-gray-300 flex flex-col shadow-xl">
    <div class="bg-[#ededed] p-4 flex items-center justify-between border-b">
        <div class="font-bold text-[#075e54] text-lg">Active Contacts</div>
        <span id="my-name-tag" class="text-xs font-semibold text-gray-600"></span>
    </div>
    <div id="user-list" class="flex-1 overflow-y-auto"></div>
</div>

<div class="flex-1 flex flex-col bg-[#e5ddd5] relative">
    <div class="bg-[#ededed] p-3 flex items-center justify-between shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gray-400 rounded-full flex items-center justify-center text-white shadow"><i class="fas fa-user"></i></div>
            <div>
                <h2 id="current-chat-name" class="font-bold text-gray-800">Global Group</h2>
                <p id="typing-status" class="text-xs text-green-600 h-3 italic"></p>
            </div>
        </div>
    </div>

    <div id="chat-window" class="p-6 overflow-y-auto flex flex-col space-y-4"></div>

    <form id="chat-form" class="bg-[#f0f2f5] p-3 flex gap-3 items-center sticky bottom-0 border-t">
        <input type="file" id="file-input" accept="image/*" class="hidden">
        <button type="button" onclick="document.getElementById('file-input').click()" class="text-gray-500 hover:text-gray-700 text-xl transition">
            <i class="fas fa-paperclip"></i>
        </button>
        <input id="msg-input" type="text" placeholder="মেসেজ লিখুন..." class="flex-1 p-3 rounded-xl border-none focus:outline-none text-sm shadow-sm">
        <button type="submit" class="bg-[#128c7e] text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-[#075e54] transition shadow">
            <i class="fas fa-paper-plane"></i>
        </button>
    </form>
</div>

<audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const chatWindow = document.getElementById('chat-window');
    const userListDiv = document.getElementById('user-list');
    const currentChatName = document.getElementById('current-chat-name');
    const msgInput = document.getElementById('msg-input');
    const fileInput = document.getElementById('file-input');

    let selectedUserId = null;
    let userName = localStorage.getItem('chat-user') || "";

    // নাম আগে থেকে থাকলে পপআপ হাইড করা
    if(userName) {
        document.getElementById("name-popup").style.display="none";
        document.getElementById('my-name-tag').innerText = "Me: " + userName;
        socket.emit('new-user', userName);
    }

    function startChat(){
        const name = document.getElementById("name-input").value.trim();
        if(!name){ alert("নাম লিখুন"); return; }
        userName = name;
        localStorage.setItem('chat-user', name);
        document.getElementById('my-name-tag').innerText = "Me: " + userName;
        document.getElementById("name-popup").style.display="none";
        socket.emit('new-user', userName);
    }

    function getBDTime(){
        return new Intl.DateTimeFormat('en-US',{ timeZone:'Asia/Dhaka', hour:'2-digit', minute:'2-digit', hour12:true }).format(new Date());
    }

    // পুরনো হিস্ট্রি লোড
    socket.on('load-history', (history) => {
        chatWindow.innerHTML = '';
        history.forEach(data => {
            const isMe = data.user === userName;
            appendMessage(isMe ? 'আপনি' : data.user, data.text, data.time, isMe ? 'self-end bg-[#dcf8c6]' : 'self-start bg-white', data.isFile, data.msgId);
        });
    });

    socket.on('user-list', users => {
        userListDiv.innerHTML=`<div onclick="selectUser(null)" class="p-4 border-b cursor-pointer hover:bg-gray-100 font-bold">📢 Global Group</div>`;
        users.forEach(user => {
            if(user.id!==socket.id){
                const div=document.createElement('div');
                div.className=`p-4 border-b cursor-pointer hover:bg-gray-100 flex items-center gap-3 ${selectedUserId===user.id?'active-user':''}`;
                div.innerHTML=`<div class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center"><i class="fas fa-user text-sm"></i></div><span>${user.name}</span>`;
                div.onclick=()=>selectUser(user.id,user.name);
                userListDiv.appendChild(div);
            }
        });
    });

    function selectUser(id,name){
        selectedUserId=id;
        currentChatName.innerText=name||"Global Group";
        chatWindow.innerHTML='';
        socket.emit('request-history'); // আপনি চাইলে এখানে নির্দিষ্ট ইউজার হিস্ট্রিও আনতে পারেন
    }

    document.getElementById('chat-form').onsubmit=(e)=>{
        e.preventDefault();
        const msg=msgInput.value.trim();
        if(msg){
            const time=getBDTime();
            const msgId=Date.now().toString();
            appendMessage('আপনি',msg,time,'self-end bg-[#dcf8c6]',false,msgId);
            socket.emit('chat-message',{ targetId:selectedUserId, user:userName, text:msg, time:time, isFile:false, msgId:msgId });
            msgInput.value='';
        }
    };

    fileInput.onchange=function(){
        const file=this.files[0];
        if(file){
            const reader=new FileReader();
            reader.onload=(e)=>{
                const time=getBDTime();
                const data=e.target.result;
                const msgId=Date.now().toString();
                appendMessage('আপনি',data,time,'self-end bg-[#dcf8c6]',true,msgId);
                socket.emit('chat-message',{ targetId:selectedUserId, user:userName, text:data, time:time, isFile:true, msgId:msgId });
            };
            reader.readAsDataURL(file);
        }
    };

    socket.on('chat-message',(data)=>{
        if(data.targetId && data.senderId!==selectedUserId && selectedUserId!==null) return;
        appendMessage(data.user,data.text,data.time,'self-start bg-white',data.isFile,data.msgId);
        document.getElementById('msg-sound').play();
    });

    function appendMessage(user,content,time,bgColor,isFile,msgId){
        const wrapper=document.createElement('div');
        wrapper.className=`flex flex-col ${bgColor.includes('self-end')?'items-end':'items-start'}`;
        wrapper.id=`msg-${msgId}`;
        let body=isFile?`<img src="${content}" class="rounded-lg max-w-xs shadow"><a href="${content}" download class="text-[10px] text-blue-600 mt-1 block"><i class="fas fa-download"></i> Download</a>`
                        :`<p class="text-sm text-gray-800 pr-4" id="text-${msgId}">${content}</p>`;
        wrapper.innerHTML=`
            <div class="msg-bubble ${bgColor} p-3 rounded-xl shadow max-w-[85%] relative">
                <p class="text-[9px] font-bold text-green-700 mb-1">${user}</p>
                ${body}
                <div class="flex items-center justify-end gap-1 mt-1"><span class="text-[9px] text-gray-500">${time}</span></div>
                <div class="options-btn invisible absolute -top-2 -right-2 flex gap-1">
                    <button onclick="editMsg('${msgId}')" class="bg-white p-1 rounded-full shadow text-[10px] text-blue-500"><i class="fas fa-edit"></i></button>
                    <button onclick="deleteMsg('${msgId}')" class="bg-white p-1 rounded-full shadow text-[10px] text-red-500"><i class="fas fa-trash"></i></button>
                </div>
            </div>`;
        chatWindow.appendChild(wrapper);
        chatWindow.scrollTop=chatWindow.scrollHeight;
    }

    function deleteMsg(id){ if(confirm("মেসেজটি ডিলিট করতে চান?")) document.getElementById(`msg-${id}`).remove(); }

    function editMsg(id){
        const p=document.getElementById(`text-${id}`);
        if(!p) return alert("শুধু টেক্সট ইডিট করা যাবে");
        const newText=prompt("নতুন মেসেজ লিখুন:",p.innerText);
        if(newText) p.innerText=newText+" (Edited)";
    }

    msgInput.oninput=()=>socket.emit('typing',{user:userName,targetId:selectedUserId});
    socket.on('display-typing',data=>{
        document.getElementById('typing-status').innerText=`${data.user} টাইপ করছে...`;
        setTimeout(()=>document.getElementById('typing-status').innerText='',2000);
    });
</script>
</body>
</html>
