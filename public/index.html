<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Messenger Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="/socket.io/socket.io.js"></script>

<style>

#chat-window{
height:calc(100vh - 130px);
overflow-y:auto;
}

.my-msg{
flex-direction:row-reverse;
}

</style>

</head>

<body class="bg-gray-100 flex flex-col h-screen">

<header class="bg-green-600 text-white p-4 text-center font-bold">

ইব্রাহীম & লিপা Messenger

<p id="typing-status" class="text-sm"></p>

</header>


<div id="chat-window" class="flex flex-col p-3 gap-3"></div>


<form id="chat-form" class="flex gap-2 p-3 bg-white">

<input id="msg-input" class="flex-1 border p-2 rounded" placeholder="মেসেজ লিখুন">

<input type="file" id="file-input">

<button class="bg-green-600 text-white px-4 rounded">

Send

</button>

</form>


<script>

const socket = io();

const chatWindow = document.getElementById("chat-window");

const msgInput = document.getElementById("msg-input");

const fileInput = document.getElementById("file-input");

let userName = localStorage.getItem("user") || prompt("আপনার নাম");

localStorage.setItem("user",userName);

socket.emit("new-user",{name:userName});


function appendMessage(user,msg,time,isMe,isFile,msgId){

const div=document.createElement("div");

div.id="msg-"+msgId;

div.className="flex "+(isMe?"my-msg":"");

let body = isFile
? `<img src="${msg}" class="max-w-xs rounded">`
: `<p>${msg}</p>`;

div.innerHTML=`

<div class="bg-white p-3 rounded shadow max-w-xs">

<b>${user}</b>

${body}

<p class="text-xs text-gray-400">${time}</p>

<button onclick="deleteMsg('${msgId}')" class="text-red-500 text-xs">delete</button>

</div>

`;

chatWindow.appendChild(div);

chatWindow.scrollTop=chatWindow.scrollHeight;

}


document.getElementById("chat-form").onsubmit=e=>{

e.preventDefault();

let msg=msgInput.value.trim();

if(msg){

let time=new Date().toLocaleTimeString();

let id=Date.now().toString();

appendMessage("আপনি",msg,time,true,false,id);

socket.emit("chat-message",{

user:userName,

text:msg,

time,

isFile:false,

msgId:id

});

msgInput.value="";

}

};


fileInput.onchange=function(){

let file=this.files[0];

let reader=new FileReader();

reader.onload=e=>{

let time=new Date().toLocaleTimeString();

let id=Date.now().toString();

appendMessage("আপনি",e.target.result,time,true,true,id);

socket.emit("chat-message",{

user:userName,

text:e.target.result,

time,

isFile:true,

msgId:id

});

};

reader.readAsDataURL(file);

};


socket.on("chat-message",data=>{

appendMessage(data.user,data.text,data.time,false,data.isFile,data.msgId);

});


socket.on("load-history",history=>{

history.forEach(m=>{

appendMessage(m.user,m.text,m.time,false,m.isFile,m.msgId);

});

});


function deleteMsg(id){

socket.emit("delete-message",id);

}

socket.on("message-deleted",id=>{

document.getElementById("msg-"+id)?.remove();

});


msgInput.oninput=()=>{

socket.emit("typing",{user:userName});

};

socket.on("display-typing",data=>{

document.getElementById("typing-status").innerText=data.user+" typing...";

setTimeout(()=>{

document.getElementById("typing-status").innerText="";

},2000);

});

</script>

</body>

</html>
