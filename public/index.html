<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Pro - ইব্রাহীম & লিপা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        #chat-window { height: calc(100vh - 130px); scroll-behavior: smooth; }
        .glass { backdrop-filter: blur(15px); background: rgba(255, 255, 255, 0.85); }
        .my-msg { flex-direction: row-reverse; }
        .others-msg { flex-direction: row; }
    </style>
</head>
<body class="bg-[#f0f2f5] font-sans h-screen flex overflow-hidden">

<div id="name-popup" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="glass p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
        <h2 class="text-2xl font-bold text-[#075e54] mb-6">আপনার প্রোফাইল</h2>
        <div class="mb-6">
            <label for="profile-pic-input" class="cursor-pointer">
                <div id="avatar-preview" class="w-24 h-24 bg-gray-200 rounded-full mx-auto flex items-center justify-center border-4 border-[#128c7e] overflow-hidden">
                    <i class="fas fa-camera text-2xl text-gray-500"></i>
                </div>
            </label>
            <input type="file" id="profile-pic-input" accept="image/*" class="hidden" onchange="previewAvatar(this)">
        </div>
        <div class="grid grid-cols-1 gap-4">
            <button onclick="setIdentity('ইব্রাহীম')" class="bg-[#128c7e] text-white p-4 rounded-2xl font-bold text-lg shadow-lg hover:scale-105 transition">আমি ইব্রাহীম</button>
            <button onclick="setIdentity('লিপা আক্তার')" class="bg-[#e91e63] text-white p-4 rounded-2xl font-bold text-lg shadow-lg hover:scale-105 transition">আমি লিপা আক্তার</button>
        </div>
    </div>
</div>

<div class="flex-1 flex flex-col relative w-full h-full">
    <div class="bg-white/80 backdrop-blur-md p-4 flex items-center justify-between shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#128c7e] rounded-full flex items-center justify-center text-white"><i class="fas fa-heart"></i></div>
            <div>
                <h2 class="font-bold text-gray-800">ইব্রাহীম ❤️ লিপা</h2>
                <p id="typing-status" class="text-xs text-green-600 h-4 font-medium"></p>
            </div>
        </div>
    </div>

    <div id="chat-window" class="p-4 overflow-y-auto flex flex-col space-y-4 bg-[#e5ddd5]"></div>

    <form id="chat-form" class="bg-white p-3 flex gap-2 items-center border-t shadow-lg sticky bottom-0">
        <input type="file" id="file-input" accept="image/*" class="hidden">
        <button type="button" onclick="document.getElementById('file-input').click()" class="text-gray-500 text-2xl p-2 hover:text-[#128c7e]"><i class="fas fa-image"></i></button>
        <input id="msg-input" type="text" autocomplete="off" placeholder="মেসেজ লিখুন..." class="flex-1 p-3 bg-gray-100 rounded-full focus:outline-none border-none text-sm">
        <button type="submit" class="bg-[#128c7e] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition"><i class="fas fa-paper-plane"></i></button>
    </form>
</div>

<audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const chatWindow = document.getElementById('chat-window');
    const msgInput = document.getElementById('msg-input');
    const fileInput = document.getElementById('file-input');

    let userName = localStorage.getItem('chat-user') || "";
    let userAvatar = localStorage.getItem('chat-avatar') || "";

    function previewAvatar(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                userAvatar = e.target.result;
                localStorage.setItem('chat-avatar', userAvatar);
                document.getElementById('avatar-preview').innerHTML = `<img src="${userAvatar}" class="w-full h-full object-cover">`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function setIdentity(name) {
        userName = name;
        localStorage.setItem('chat-user', name);
        document.getElementById("name-popup").style.display = "none";
        socket.emit('new-user', { name, avatar: userAvatar });
    }

    if(userName) {
        document.getElementById("name-popup").style.display = "none";
        socket.emit('new-user', { name: userName, avatar: userAvatar });
    }

    function deleteMsg(msgId) {
        if(confirm("মেসেজটি কি চিরতরে ডিলিট করতে চান?")) {
            socket.emit('delete-message', msgId);
        }
    }

    socket.on('message-deleted', (id) => { document.getElementById(`msg-${id}`)?.remove(); });

    socket.on('load-history', history => {
        chatWindow.innerHTML = '';
        history.forEach(d => appendMessage(d.user === userName ? 'আপনি' : d.user, d.text, d.time, d.user === userName, d.isFile, d.msgId, d.avatar));
    });

    socket.on('chat-message', d => {
        appendMessage(d.user, d.text, d.time, false, d.isFile, d.msgId, d.avatar);
        document.getElementById('msg-sound').play();
    });

    function appendMessage(user, content, time, isMe, isFile, msgId, avatar) {
        const wrapper = document.createElement('div');
        wrapper.id = `msg-${msgId}`;
        wrapper.className = `flex gap-2 ${isMe ? 'my-msg' : 'others-msg'} items-end`;

        const avatarImg = avatar ? `<img src="${avatar}" class="w-8 h-8 rounded-full border shadow-sm">` : `<div class="w-8 h-8 bg-gray-400 rounded-full"></div>`;
        const bgColor = isMe ? 'bg-[#dcf8c6]' : 'bg-white';

        let body = isFile ? `<img src="${content}" class="rounded-xl max-w-[220px] shadow-sm">` : `<p class="text-sm text-gray-800">${content}</p>`;

        wrapper.innerHTML = `
            ${avatarImg}
            <div class="group relative ${bgColor} p-3 rounded-2xl shadow-sm max-w-[75%] border border-black/5">
                <p class="text-[9px] font-bold ${isMe ? 'text-[#075e54]' : 'text-[#e91e63]'} mb-1">${user}</p>
                ${body}
                <p class="text-[8px] text-gray-400 text-right mt-1">${time}</p>
                <div class="absolute -top-2 -right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onclick="deleteMsg('${msgId}')" class="bg-white p-1 rounded-full shadow-md text-red-500 text-[10px] border"><i class="fas fa-trash"></i></button>
                </div>
            </div>`;
        chatWindow.appendChild(wrapper);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    document.getElementById('chat-form').onsubmit = e => {
        e.preventDefault();
        const msg = msgInput.value.trim();
        if(msg) {
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const msgId = Date.now().toString();
            appendMessage('আপনি', msg, time, true, false, msgId, userAvatar);
            socket.emit('chat-message', { user: userName, text: msg, time, isFile: false, msgId, avatar: userAvatar });
            msgInput.value = '';
        }
    };

    fileInput.onchange = function() {
        const file = this.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const msgId = Date.now().toString();
                appendMessage('আপনি', e.target.result, time, true, true, msgId, userAvatar);
                socket.emit('chat-message', { user: userName, text: e.target.result, time, isFile: true, msgId, avatar: userAvatar });
            };
            reader.readAsDataURL(file);
        }
    };

    msgInput.oninput = () => socket.emit('typing', {user: userName});
    socket.on('display-typing', data => {
        document.getElementById('typing-status').innerText = `${data.user} টাইপ করছে...`;
        setTimeout(() => document.getElementById('typing-status').innerText = '', 2000);
    });
</script>
</body>
</html>
