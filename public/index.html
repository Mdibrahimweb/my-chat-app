<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger Pro - Ibrahim & Lipa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --chat-bg-color: #e5ddd5;
        }

        .dark {
            --chat-bg-color: #0b141a;
        }

        body {
            transition: background 0.3s;
        }

        #chat-window {
            height: calc(100vh - 130px);
            background-color: var(--chat-bg-color);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .glass {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.9);
        }

        .dark .glass {
            background: rgba(15, 23, 42, 0.9);
            color: white;
        }

        .msg-bubble {
            max-width: 85%;
            word-wrap: break-word;
        }

        /* মোবাইল রেসপন্সিভ সাইডবার */
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                left: -100%;
                z-index: 100;
                height: 100%;
                width: 280px;
                transition: 0.3s;
            }

            #sidebar.active {
                left: 0;
            }

            #overlay {
                display: none;
            }

            #overlay.active {
                display: block;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 90;
            }
        }
    </style>
</head>

<body class="bg-gray-100 dark:bg-slate-950 font-sans h-screen flex overflow-hidden">

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div id="name-popup" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[110] p-4">
        <div class="glass p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center border border-white/20">
            <h2 class="text-2xl font-bold text-[#128c7e] mb-6">প্রোফাইল সেটআপ</h2>
            <div class="mb-6 relative inline-block">
                <label for="profile-pic-input" class="cursor-pointer">
                    <div id="avatar-preview"
                        class="w-24 h-24 bg-gray-200 rounded-full flex items-center justify-center border-4 border-[#128c7e] overflow-hidden shadow-inner">
                        <i class="fas fa-user text-4xl text-gray-400"></i>
                    </div>
                    <div class="absolute bottom-0 right-0 bg-[#128c7e] text-white p-2 rounded-full text-xs shadow-lg"><i
                            class="fas fa-pen"></i></div>
                </label>
                <input type="file" id="profile-pic-input" accept="image/*" class="hidden"
                    onchange="updatePreview(this, 'avatar-preview')">
            </div>
            <div class="flex flex-col gap-3">
                <button onclick="setIdentity('ইব্রাহীম')"
                    class="bg-[#128c7e] text-white p-4 rounded-xl font-bold hover:brightness-110 active:scale-95 transition">আমি
                    ইব্রাহীম</button>
                <button onclick="setIdentity('লিপা আক্তার')"
                    class="bg-[#e91e63] text-white p-4 rounded-xl font-bold hover:brightness-110 active:scale-95 transition">আমি
                    লিপা আক্তার</button>
            </div>
        </div>
    </div>

    <div id="sidebar" class="bg-white dark:bg-slate-900 border-r dark:border-slate-800 flex flex-col shadow-2xl">
        <div class="p-4 bg-[#128c7e] text-white flex justify-between items-center">
            <span class="font-bold uppercase tracking-wider">অ্যাক্টিভ মেম্বার</span>
            <button onclick="toggleSidebar()" class="md:hidden"><i class="fas fa-times"></i></button>
        </div>
        <div id="user-list" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

        <div class="p-4 border-t dark:border-slate-800 space-y-3">
            <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase">কাস্টমাইজেশন</label>
            <button onclick="toggleTheme()"
                class="w-full flex items-center justify-between p-3 bg-gray-100 dark:bg-slate-800 rounded-xl dark:text-white">
                <span>ডার্ক মোড</span> <i id="theme-icon" class="fas fa-moon"></i>
            </button>
            <label
                class="w-full flex items-center justify-between p-3 bg-gray-100 dark:bg-slate-800 rounded-xl cursor-pointer dark:text-white">
                <span>ব্যাকগ্রাউন্ড পরিবর্তন</span> <i class="fas fa-image"></i>
                <input type="file" accept="image/*" class="hidden" onchange="setChatBackground(this)">
            </label>
        </div>
    </div>

    <div class="flex-1 flex flex-col w-full">
        <header
            class="h-16 bg-[#ededed] dark:bg-slate-800 flex items-center px-4 justify-between border-b dark:border-slate-700">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="text-[#128c7e] text-xl p-2 md:hidden"><i
                        class="fas fa-bars"></i></button>
                <div>
                    <h2 class="font-bold text-gray-800 dark:text-white text-base">আমাদের চ্যাট</h2>
                    <p id="typing-status" class="text-[10px] text-green-600 font-medium italic"></p>
                </div>
            </div>
            <div id="current-user-tag"
                class="text-[10px] bg-white dark:bg-slate-700 px-3 py-1 rounded-full border dark:text-gray-300"></div>
        </header>

        <div id="chat-window" class="p-4 overflow-y-auto flex flex-col space-y-4"></div>

        <form id="chat-form"
            class="h-16 bg-white dark:bg-slate-900 flex items-center px-3 gap-2 border-t dark:border-slate-800">
            <button type="button" onclick="document.getElementById('file-input').click()"
                class="text-gray-400 text-2xl px-2"><i class="fas fa-paperclip"></i></button>
            <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleImageSend(this)">
            <input id="msg-input" type="text" placeholder="মেসেজ লিখুন..."
                class="flex-1 bg-gray-100 dark:bg-slate-800 dark:text-white rounded-full py-2 px-4 focus:outline-none text-sm border dark:border-slate-700">
            <button type="submit"
                class="bg-[#128c7e] text-white w-10 h-10 rounded-full shadow-lg flex items-center justify-center active:scale-90 transition"><i
                    class="fas fa-paper-plane"></i></button>
        </form>
    </div>

    <audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const chatWindow = document.getElementById('chat-window');
        const msgInput = document.getElementById('msg-input');
        let userName = localStorage.getItem('chat-user') || "";
        let userAvatar = localStorage.getItem('chat-avatar') || "";

        // থিম এবং ব্যাকগ্রাউন্ড সেটআপ
        if (localStorage.getItem('theme') === 'dark') toggleTheme(true);
        if (localStorage.getItem('chat-bg')) chatWindow.style.backgroundImage = `url(${localStorage.getItem('chat-bg')})`;

        function toggleTheme(init = false) {
            if (!init) document.body.classList.toggle('dark');
            else document.body.classList.add('dark');
            const isDark = document.body.classList.contains('dark');
            document.getElementById('theme-icon').className = isDark ? "fas fa-sun text-yellow-400" : "fas fa-moon";
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function setChatBackground(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    chatWindow.style.backgroundImage = `url(${e.target.result})`;
                    localStorage.setItem('chat-bg', e.target.result);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function updatePreview(input, targetId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    userAvatar = e.target.result;
                    document.getElementById(targetId).innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function setIdentity(name) {
            userName = name;
            localStorage.setItem('chat-user', name);
            localStorage.setItem('chat-avatar', userAvatar);
            document.getElementById("name-popup").style.display = "none";
            document.getElementById("current-user-tag").innerText = `আপনি: ${name}`;
            socket.emit('new-user', { name, avatar: userAvatar });
        }

        if (userName) {
            document.getElementById("name-popup").style.display = "none";
            document.getElementById("current-user-tag").innerText = `আপনি: ${userName}`;
            socket.emit('new-user', { name: userName, avatar: userAvatar });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function appendMessage(user, content, time, align, isFile, msgId, avatar) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full ${align === 'self-end' ? 'justify-end' : 'justify-start'}`;
            wrapper.id = `msg-${msgId}`;

            const isSelf = align === 'self-end';
            const bubbleColor = isSelf ? 'bg-[#dcf8c6] dark:bg-[#054740]' : 'bg-white dark:bg-slate-800';

            wrapper.innerHTML = `
            <div class="flex gap-2 ${isSelf ? 'flex-row-reverse' : 'flex-row'} items-end msg-bubble">
                <img src="${avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="w-6 h-6 rounded-full border border-gray-300">
                <div class="group relative ${bubbleColor} p-2.5 rounded-2xl shadow-sm border dark:border-slate-700">
                    <p class="text-[9px] font-bold text-gray-500 mb-0.5">${user}</p>
                    ${isFile ? `<img src="${content}" class="rounded-lg max-w-full sm:max-w-[250px] cursor-zoom-in" onclick="window.open(this.src)">` : `<p class="text-sm dark:text-gray-100 leading-tight">${content}</p>`}
                    <div class="flex items-center justify-end gap-1 mt-1">
                        <span class="text-[8px] text-gray-400">${time}</span>
                        ${isSelf ? `<button onclick="deleteMsg('${msgId}')" class="opacity-0 group-hover:opacity-100 text-red-500 transition ml-1"><i class="fas fa-trash-can text-[10px]"></i></button>` : ''}
                    </div>
                </div>
            </div>`;
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // চ্যাট ইভেন্টগুলো (আগের মতই থাকবে)
        document.getElementById('chat-form').onsubmit = e => {
            e.preventDefault();
            const msg = msgInput.value.trim();
            if (msg) {
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const msgId = Date.now().toString();
                appendMessage('আপনি', msg, time, 'self-end', false, msgId, userAvatar);
                socket.emit('chat-message', { user: userName, text: msg, time, isFile: false, msgId, avatar: userAvatar });
                msgInput.value = '';
            }
        };

        function handleImageSend(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const msgId = Date.now().toString();
                    appendMessage('আপনি', e.target.result, time, 'self-end', true, msgId, userAvatar);
                    socket.emit('chat-message', { user: userName, text: e.target.result, time, isFile: true, msgId, avatar: userAvatar });
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function deleteMsg(msgId) {
            if (confirm("মেসেজটি ডিলিট করতে চান?")) socket.emit('delete-message', msgId);
        }

        socket.on('chat-message', d => { appendMessage(d.user, d.text, d.time, 'self-start', d.isFile, d.msgId, d.avatar); document.getElementById('msg-sound').play(); });
        socket.on('message-deleted', msgId => document.getElementById(`msg-${msgId}`)?.remove());
        socket.on('load-history', h => { chatWindow.innerHTML = ''; h.forEach(d => appendMessage(d.user === userName ? 'আপনি' : d.user, d.text, d.time, d.user === userName ? 'self-end' : 'self-start', d.isFile, d.msgId, d.avatar)); });
        socket.on('user-list', users => {
            const list = document.getElementById('user-list');
            list.innerHTML = users.map(u => `
            <div class="flex items-center gap-3 p-2 rounded-lg bg-gray-50 dark:bg-slate-800">
                <img src="${u.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="w-8 h-8 rounded-full">
                <span class="text-sm font-medium dark:text-gray-200">${u.name}</span>
                <span class="w-2 h-2 bg-green-500 rounded-full ml-auto"></span>
            </div>`).join('');
        });
        msgInput.oninput = () => socket.emit('typing', { user: userName });
        socket.on('display-typing', d => {
            document.getElementById('typing-status').innerText = `${d.user} টাইপ করছে...`;
            setTimeout(() => document.getElementById('typing-status').innerText = '', 2000);
        });
    </script>
</body>

</html>
