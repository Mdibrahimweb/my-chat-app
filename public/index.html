<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Pro - Lite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        #chat-window { height: calc(100vh - 130px); overflow-y: auto; background: #e5ddd5; }
        .bubble { max-width: 80%; padding: 10px; border-radius: 15px; margin-bottom: 10px; }
        .self { background: #dcf8c6; margin-left: auto; border-bottom-right-radius: 2px; }
        .other { background: #ffffff; margin-right: auto; border-bottom-left-radius: 2px; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <div id="auth-modal" class="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl w-full max-w-sm shadow-2xl">
            <h2 class="text-2xl font-bold text-[#128c7e] mb-6 text-center">MESSENGER PRO</h2>
            <input id="auth-user" type="text" placeholder="ইউজারনেম" class="w-full border p-3 mb-3 rounded-xl outline-none focus:border-green-500">
            <input id="auth-pass" type="password" placeholder="পাসওয়ার্ড" class="w-full border p-3 mb-4 rounded-xl outline-none focus:border-green-500">
            <button onclick="handleAuth('login')" class="w-full bg-[#128c7e] text-white p-3 rounded-xl font-bold hover:bg-green-700 transition">লগইন</button>
            <button onclick="handleAuth('reg')" class="w-full mt-3 text-sm text-gray-500 hover:underline">নতুন অ্যাকাউন্ট তৈরি করুন</button>
        </div>
    </div>

    <div class="hidden md:flex w-72 bg-white border-r flex-col">
        <div class="p-4 bg-[#075e54] text-white font-bold">সক্রিয় ইউজার</div>
        <div id="user-list" class="p-4 space-y-2"></div>
    </div>

    <div class="flex-1 flex flex-col">
        <header class="h-16 bg-[#075e54] text-white flex items-center px-4 justify-between shadow-lg">
            <div class="flex items-center gap-3">
                <i class="fas fa-circle text-green-400 text-[10px]"></i>
                <h2 id="my-name" class="font-bold">লোড হচ্ছে...</h2>
            </div>
            <button onclick="logout()" class="text-sm bg-red-500 px-3 py-1 rounded">লগআউট</button>
        </header>

        <div id="chat-window" class="p-4 flex flex-col"></div>

        <div class="p-3 bg-white border-t flex gap-2 items-center">
            <input id="msg-input" type="text" placeholder="মেসেজ লিখুন..." class="flex-1 bg-gray-100 border p-3 rounded-full outline-none px-5">
            <button onclick="sendMsg()" class="bg-[#128c7e] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const socket = io();
        let currentUser = JSON.parse(localStorage.getItem('messenger-user'));

        if (currentUser) {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('my-name').innerText = currentUser.username;
            socket.emit('join', currentUser);
        }

        async function handleAuth(type) {
            const username = document.getElementById('auth-user').value;
            const pass = document.getElementById('auth-pass').value;
            if(!username || !pass) return alert("সব ঘর পূরণ করুন!");

            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, pass, type, avatar: 'https://cdn-icons-png.flaticon.com/512/149/149071.png' })
            });
            
            const data = await res.json();
            if (data.error) return alert(data.error);
            
            localStorage.setItem('messenger-user', JSON.stringify(data));
            location.reload();
        }

        function append(user, text, isSelf, time) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `bubble ${isSelf ? 'self shadow-md' : 'other shadow-sm border'}`;
            div.innerHTML = `
                <div class="text-[10px] font-bold ${isSelf ? 'text-green-700' : 'text-blue-600'} mb-1">${user}</div>
                <div class="text-sm text-gray-800">${text}</div>
                <div class="text-[9px] text-gray-400 text-right mt-1">${time}</div>
            `;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;

            const data = {
                user: currentUser.username,
                text: input.value,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                avatar: currentUser.avatar
            };

            append('আপনি', data.text, true, data.time);
            socket.emit('chat-message', data);
            input.value = '';
        }

        function logout() { localStorage.clear(); location.reload(); }

        // সকেট লিসেনার্স
        socket.on('chat-message', d => append(d.user, d.text, false, d.time));
        socket.on('load-history', h => h.forEach(d => append(d.user === currentUser.username ? 'আপনি' : d.user, d.text, d.user === currentUser.username, d.time)));
        
        socket.on('user-list', users => {
            document.getElementById('user-list').innerHTML = users.map(u => `
                <div class="flex items-center gap-2 p-2 hover:bg-gray-100 rounded-lg">
                    <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                    <span class="text-sm font-medium">${u.username}</span>
                </div>
            `).join('');
        });

        // Enter key support
        document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };
    </script>
</body>
</html>
